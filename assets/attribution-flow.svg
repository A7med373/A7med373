<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="24" fill="#f6f8fb"/>
  <rect x="40" y="40" width="1200" height="640" rx="18" fill="#ffffff" stroke="#d9e0ea"/>
  <text x="72" y="92" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Атрибуция конверсий</text>
  <text x="72" y="124" font-family="Arial, sans-serif" font-size="17" fill="#64748b">Связка рекламных кликов, событий сайта и заказов маркетплейса</text>

  <g>
    <rect x="72" y="160" width="248" height="92" rx="14" fill="#eef6ff" stroke="#b8d7ff"/>
    <text x="96" y="198" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">12k событий/час</text>
    <text x="96" y="226" font-family="Arial, sans-serif" font-size="15" fill="#475569">FastAPI async + PostgreSQL</text>
  </g>
  <g>
    <rect x="344" y="160" width="248" height="92" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="368" y="198" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">Потери -20%</text>
    <text x="368" y="226" font-family="Arial, sans-serif" font-size="15" fill="#475569">sendBeacon + keepalive</text>
  </g>
  <g>
    <rect x="616" y="160" width="248" height="92" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="640" y="198" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c2410c">Окно 72 часа</text>
    <text x="640" y="226" font-family="Arial, sans-serif" font-size="15" fill="#475569">время + товар + регион</text>
  </g>
  <g>
    <rect x="888" y="160" width="280" height="92" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="912" y="198" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6d28d9">Идемпотентный sync</text>
    <text x="912" y="226" font-family="Arial, sans-serif" font-size="15" fill="#475569">Celery + RabbitMQ + PG locks</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="84" y="342" width="150" height="78" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="116" y="377" font-size="17" font-weight="700" fill="#111827">Клик</text>
    <text x="112" y="401" font-size="14" fill="#64748b">реклама</text>

    <path d="M246 381H323" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="336" y="342" width="150" height="78" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="374" y="377" font-size="17" font-weight="700" fill="#111827">Событие</text>
    <text x="374" y="401" font-size="14" fill="#64748b">сайт</text>

    <path d="M498 381H575" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="588" y="330" width="170" height="102" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="632" y="371" font-size="18" font-weight="700" fill="#1d4ed8">Матчинг</text>
    <text x="618" y="399" font-size="14" fill="#475569">порог >= 0.6</text>

    <path d="M770 381H847" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="860" y="342" width="150" height="78" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="902" y="377" font-size="17" font-weight="700" fill="#111827">Заказ</text>
    <text x="906" y="401" font-size="14" fill="#64748b">WB</text>

    <path d="M1022 381H1099" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="1112" y="342" width="96" height="78" rx="16" fill="#f0fdf4" stroke="#86efac"/>
    <text x="1134" y="377" font-size="17" font-weight="700" fill="#15803d">Метрика</text>
    <text x="1135" y="401" font-size="14" fill="#64748b">offline</text>
  </g>

  <rect x="72" y="500" width="1096" height="112" rx="14" fill="#0f172a"/>
  <text x="96" y="536" font-family="Arial, sans-serif" font-size="15" fill="#93c5fd">worker.sync.orders</text>
  <text x="96" y="566" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0">matched click_id=*** order_id=*** confidence=0.72 region=RU-TA</text>
  <text x="96" y="596" font-family="Arial, sans-serif" font-size="15" fill="#86efac">offline conversion sent: status=ok, duplicate=false</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
